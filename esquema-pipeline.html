  :root{--ink:#2f2a26;--paper:#fbf9f3;--accent:#c0392b;--hl:#ffdf6b;--muted:#8a8377}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;padding:0}
  body{font-family:'PatrickHand','Comic Sans MS',cursive;color:var(--ink);
    background-color:var(--paper);
    background-image:linear-gradient(to bottom, rgba(0,0,0,.035) 1px, transparent 1px);
    background-size:100% 30px;overflow:hidden;-webkit-font-smoothing:antialiased}
  .wrap{height:100vh;max-width:1360px;margin:0 auto;padding:8px 16px 10px;display:flex;flex-direction:column}

  header.top{text-align:center;flex:0 0 auto}
  header.top h1{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(22px,3.4vw,38px);margin:0;line-height:1}
  header.top h1 .brick{color:var(--accent)}
  header.top p.sub{margin:1px 0 0;font-size:clamp(13px,1.7vw,16px);color:var(--muted)}

  .main{flex:1 1 auto;min-height:0;display:flex;gap:16px;align-items:stretch;margin-top:6px}
  .stage{position:relative;flex:1 1 auto;min-width:0;border:2.5px solid var(--ink);border-radius:14px;background:#fffefb;
    box-shadow:6px 8px 0 rgba(47,42,38,.13);overflow:hidden;display:flex;align-items:center;justify-content:center;animation:fadein .6s ease both}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  svg#diagram{display:block;width:100%;height:100%}

  .side{flex:0 0 380px;min-height:0;display:flex;flex-direction:column;gap:10px}
  .card{position:relative;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:visible;background:#fffdf5;border:2.5px solid var(--ink);border-radius:12px;
    padding:16px 18px;box-shadow:5px 7px 0 rgba(47,42,38,.16)}
  .card .kicker{align-self:flex-start;display:inline-block;font-size:14px;color:#fff;background:var(--ink);padding:2px 11px;border-radius:20px;margin-bottom:6px}
  .card h2{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(22px,2.4vw,30px);margin:2px 0 6px;line-height:1.05}
  .card .body{font-size:16px;line-height:1.42;margin:4px 0 12px}
  .card .body code{font-family:'PatrickHand',cursive;background:var(--hl);padding:0 5px;border-radius:5px}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:14px;border:2px solid var(--ink);border-radius:18px;padding:3px 11px;background:#fffefb}
  .chip svg.lg{width:16px;height:16px;display:block}
  .card .num{position:absolute;top:-14px;right:-10px;font-family:'Caveat',cursive;font-weight:700;font-size:34px;color:var(--accent);
    background:var(--hl);border:2.5px solid var(--ink);border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    transform:rotate(8deg);box-shadow:3px 4px 0 rgba(47,42,38,.18)}
  .cardfade{animation:cardin .4s ease both}
  @keyframes cardin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .node{transition:opacity .5s ease, transform .5s cubic-bezier(.2,.85,.25,1);cursor:pointer}
  .node.dim{opacity:.26}
  .node text{user-select:none}
  .hl{opacity:0;transition:opacity .55s ease}
  .hl.show{opacity:.85}
  .arrow{opacity:.13;transition:opacity .45s ease}
  .arrow.on{opacity:1}
  .arrow .arrow-label{opacity:0;transition:opacity .45s ease;font-size:16px;fill:var(--ink)}
  .arrow.on .arrow-label{opacity:1}
  .arrow.on path,.arrow.on line{stroke:var(--accent)}

  .controls{flex:0 0 auto;display:flex;flex-direction:column;gap:8px;margin-top:auto;padding-top:12px}
  .ctl-row{display:flex;align-items:center;justify-content:center;gap:7px}
  .ctl-row.end{justify-content:flex-end}
  button.btn{font-family:'PatrickHand',cursive;font-size:15px;color:var(--ink);background:#fffefb;border:2.5px solid var(--ink);border-radius:30px;
    padding:5px 11px;cursor:pointer;box-shadow:2px 3px 0 rgba(47,42,38,.18);transition:transform .12s ease, box-shadow .12s ease, background .2s}
  button.btn:hover{transform:translate(-1px,-1px)}
  button.btn:active{transform:translate(1px,2px)}
  button.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.btn:disabled{opacity:.4;cursor:not-allowed}
  .dots{display:flex;gap:7px;align-items:center}
  .dot{width:13px;height:13px;border-radius:50%;border:2.5px solid var(--ink);background:#fffefb;cursor:pointer;transition:background .2s, transform .2s}
  .dot.active{background:var(--accent);transform:scale(1.25)}

  footer.note{flex:0 0 auto;text-align:center;color:var(--muted);font-size:12.5px;margin:0}
  footer.note b{color:var(--ink)}

</style>
</head>

  <div class="wrap">
    <header class="top">
      <h1>Mi pipeline de <span class="brick">Integración y Entrega Continua</span></h1>
      <p class="sub">The Wall · un muro de mensajes con CI/CD </p>
    </header>

    <div class="main">
      <div class="stage">
        <svg id="diagram" viewBox="0 0 1240 700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Esquema del pipeline"></svg>

      <aside class="side">
        <div class="card cardfade" id="card">
          <div class="num" id="cnum">&rsaquo;</div>
          <span class="kicker" id="ckicker">Recorré el pipeline</span>
          <h2 id="ctitle">Hacé clic en "Siguiente" para empezar</h2>
          <div class="body" id="cbody"></div>
          <div class="chips" id="cchips"></div>
          <div class="controls">
            <div class="ctl-row">
              <button class="btn" id="prev">&#9664; Anterior</button>
              <div class="dots" id="dots"></div>
              <button class="btn primary" id="next">Siguiente &#9654;</button>
            </div>
            <div class="ctl-row end">
              <button class="btn" id="reset">&#8635; Ver todo</button>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

      const sp=document.createElement('span');sp.className='chip';
      if(typeof c==='object'&&LOGOS[c.l]){
        sp.innerHTML='<svg class="lg" viewBox="0 0 24 24"><path fill="'+LOGOS[c.l].c+'" d="'+LOGOS[c.l].d+'"></path></svg>'+
          '<span>'+c.t+'</span>';
      }else{sp.textContent=c;}
      return sp;
    }

    const dotsBox=document.getElementById('dots');
    STEPS.forEach((s,i)=>{const d=document.createElement('div');d.className='dot';d.title=s.title;d.addEventListener('click',()=>{stopPlay();goTo(i);});dotsBox.appendChild(d);});

    const card=document.getElementById('card'),cnum=document.getElementById('cnum'),ckicker=document.getElementById('ckicker'),
      ctitle=document.getElementById('ctitle'),cbody=document.getElementById('cbody'),cchips=document.getElementById('cchips'),
      btnPrev=document.getElementById('prev'),btnNext=document.getElementById('next'),btnPlay=document.createElement('button');

    let cur=-1,playing=false,timer=null;

    function clearActive(){
      Object.values(nodeEls).forEach(o=>{o.g.classList.remove('dim');o.g.style.transform='';o.hl.classList.remove('show');});
      Object.values(arrowEls).forEach(a=>a.classList.remove('on'));
    }
    function replayCard(){card.classList.remove('cardfade');void card.offsetWidth;card.classList.add('cardfade');}

    function overview(){
      cur=-1;clearActive();
      document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
      cnum.textContent='›';ckicker.textContent='Recorré el pipeline';
      ctitle.textContent='Este es mi entorno de Integración y Entrega Continua';
      cchips.innerHTML='';
      [{l:'vscode',t:'VS Code'},{l:'nodedotjs',t:'Node.js'},{l:'npm',t:'npm'},{l:'vitest',t:'Vitest'},{l:'eslint',t:'ESLint'},{l:'git',t:'Git'},{l:'github',t:'GitHub'},{l:'githubactions',t:'GitHub Actions'},{l:'nextdotjs',t:'Next.js'},{l:'vercel',t:'Vercel'},{l:'supabase',t:'Supabase'}].forEach(c=>cchips.appendChild(chipEl(c)));
      btnPrev.disabled=true;btnNext.disabled=false;replayCard();
    }

    function goTo(i){
      if(i<0)return overview();
      if(i>=STEPS.length)i=STEPS.length-1;
      cur=i;const s=STEPS[i];clearActive();
      const active=new Set(s.nodes);
      Object.keys(nodeEls).forEach(id=>{const o=nodeEls[id];
        if(active.has(id)){o.g.classList.remove('dim');o.hl.classList.add('show');o.g.style.transformOrigin=o.cx+'px '+o.cy+'px';o.g.style.transform='scale(1.05)';}
        else o.g.classList.add('dim');});
      s.arrows.forEach(aid=>{const a=arrowEls[aid];if(a){a.classList.add('on');drawOn(a);}});
      cnum.textContent=(i+1);ckicker.textContent=s.kicker;ctitle.textContent=s.title;cbody.innerHTML=s.body;
      cchips.innerHTML='';s.chips.forEach(c=>cchips.appendChild(chipEl(c)));replayCard();
      document.querySelectorAll('.dot').forEach((d,k)=>d.classList.toggle('active',k===i));
      btnPrev.disabled=false;btnNext.disabled=false;
    }
    function next(){if(cur>=STEPS.length-1){stopPlay();goTo(0);return;}goTo(cur+1);}
    function prev(){if(cur<=0){overview();return;}goTo(cur-1);}
    function stopPlay(){playing=false;clearInterval(timer);btnPlay.textContent='▶ Tour automático';btnPlay.classList.remove('primary');}
    function startPlay(){playing=true;btnPlay.textContent='⏸ Pausar';btnPlay.classList.add('primary');if(cur<0)goTo(0);
      timer=setInterval(()=>{if(cur>=STEPS.length-1)goTo(0);else goTo(cur+1);},4200);}

    btnNext.addEventListener('click',()=>{stopPlay();next();});
    btnPrev.addEventListener('click',()=>{stopPlay();prev();});
    document.getElementById('reset').addEventListener('click',()=>{stopPlay();overview();});

    Object.keys(nodeEls).forEach(id=>nodeEls[id].g.addEventListener('click',()=>{stopPlay();const idx=STEPS.findIndex(s=>s.nodes[0]===id);if(idx>=0)goTo(idx);}));
    document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'){stopPlay();next();}else if(e.key==='ArrowLeft'){stopPlay();prev();}});

    overview();
  })();
  </script>
</body>
</html>
